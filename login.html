<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Connexion — Joker University Club</title>
  <link rel="stylesheet" href="css/styles.css"/>
</head>
<body>

  <div id="nav-root"></div>

  <div class="login-page">
    <div class="login-card anim-scale">

      <div class="login-logo">Joker.</div>
      <p class="login-sub">Connectez-vous à votre espace membre</p>

      <!-- Demo info -->
      <div style="background:rgba(139,92,246,0.1);border:1px solid rgba(139,92,246,0.25);border-radius:var(--radius-md);padding:0.875rem 1rem;margin-bottom:1.5rem;font-size:0.8125rem;color:var(--text-muted);">
        <strong style="color:var(--primary-light);">Comptes démo :</strong><br>
        Admin → <code style="color:var(--accent);">admin@joker.edu</code> / <code style="color:var(--accent);">admin123</code><br>
        Membre → <code style="color:var(--accent);">membre@joker.edu</code> / <code style="color:var(--accent);">membre123</code>
      </div>

      <form id="login-form">
        <div class="form-group">
          <label class="form-label">Email</label>
          <input class="form-input" id="login-email" type="email" placeholder="nom@joker.edu" required/>
          <div class="form-error" id="err-email">Email invalide.</div>
        </div>
        <div class="form-group">
          <label class="form-label" style="display:flex;justify-content:space-between;">
            <span>Mot de passe</span>
            <a href="#" style="font-size:0.75rem;color:var(--primary-light);">Oublié ?</a>
          </label>
          <div style="position:relative;">
            <input class="form-input" id="login-password" type="password" placeholder="••••••••" required
                   style="padding-right:2.75rem;"/>
            <button type="button" id="toggle-pwd"
                    style="position:absolute;right:0.75rem;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--text-muted);cursor:pointer;font-size:1.125rem;">
              👁
            </button>
          </div>
          <div class="form-error" id="err-password">Mot de passe incorrect.</div>
        </div>

        <button type="submit" class="btn btn-primary btn-block btn-lg" id="login-btn"
                style="margin-top:0.5rem;">
          Se connecter
        </button>
      </form>

      <p style="text-align:center;margin-top:1.5rem;font-size:0.875rem;color:var(--text-muted);">
        Pas encore membre ?
        <a href="index.html" style="color:var(--primary-light);font-weight:600;">
          Découvrir le club →
        </a>
      </p>

      <p style="text-align:center;margin-top:0.75rem;font-size:0.75rem;color:var(--text-faint);">
        👋 Les visiteurs peuvent naviguer sans connexion.
      </p>
    </div>
  </div>

  <div id="toast-container"></div>

  <script src="js/navigation.js"></script>
  <script src="js/login.js"></script>
</body>
</html>
